<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIDM.NY26.G6 — Pacing Calendar</title>
<style>
:root {
  --c-bg: #f7f8fa;
  --c-surface: #fff;
  --c-border: #e0e3e8;
  --c-text: #1a1d23;
  --c-muted: #6b7280;
  --c-u1: #4e79a7; --c-u1-light: #dce8f5;
  --c-u2: #f28e2b; --c-u2-light: #fef0dc;
  --c-u3: #e15759; --c-u3-light: #fde8e8;
  --c-u4: #59a14f; --c-u4-light: #e2f2e0;
  --c-u5: #76b7b2; --c-u5-light: #dff2f1;
  --c-u6: #af7aa1; --c-u6-light: #f0e5ef;
  --c-u7: #9c755f; --c-u7-light: #ede3dc;
  --c-u8: #bab0ac; --c-u8-light: #f3f1f0;
  --c-review: #16a34a; --c-review-light: #dcfce7;
  --c-assess-mu: #7c3aed; --c-assess-eou: #4c1d95;
  --c-violation: #dc2626; --c-violation-light: #fee2e2;
  --c-combined: #92400e; --c-combined-light: #fef3c7;
  --c-half: #d97706; --c-half-light: #fef9ee;
  --c-regents: #0891b2; --c-regents-light: #e0f7fa;
  --c-break: #f3f4f6; --c-break-text: #9ca3af;
  --c-oor: #f9fafb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--c-bg); color: var(--c-text); font-size: 13px; }
#app { max-width: 1200px; margin: 0 auto; padding: 16px 20px; }

header { margin-bottom: 16px; }
h1 { font-size: 18px; font-weight: 700; }
.subtitle { color: var(--c-muted); font-size: 12px; margin-top: 2px; }

.tabs { display: flex; gap: 4px; margin-top: 14px; border-bottom: 2px solid var(--c-border); padding-bottom: 0; }
.tab { padding: 8px 18px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--c-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; border-radius: 4px 4px 0 0; }
.tab:hover { background: #f0f2f5; color: var(--c-text); }
.tab.active { color: var(--c-text); border-bottom-color: var(--c-text); font-weight: 600; }

#view-desc { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 6px; padding: 12px 16px; margin: 14px 0 12px; font-size: 12px; color: var(--c-muted); line-height: 1.6; }

.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--c-muted); }
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,.1); flex-shrink: 0; }

.cal { width: 100%; }

/* Week/Unit headers */
.unit-header { display: grid; grid-template-columns: 52px repeat(5,1fr); gap: 2px; margin: 16px 0 4px; }
.unit-header-cell { grid-column: 2 / -1; padding: 6px 10px; border-radius: 4px; font-weight: 600; font-size: 12px; display: flex; align-items: center; justify-content: space-between; }
.unit-meta { font-weight: 400; color: rgba(255,255,255,.75); font-size: 11px; }
.unit-header-cell.u1 { background: var(--c-u1); color: #fff; }
.unit-header-cell.u2 { background: var(--c-u2); color: #fff; }
.unit-header-cell.u3 { background: var(--c-u3); color: #fff; }
.unit-header-cell.u4 { background: var(--c-u4); color: #fff; }
.unit-header-cell.u5 { background: var(--c-u5); color: #fff; }
.unit-header-cell.u6 { background: var(--c-u6); color: #fff; }
.unit-header-cell.u7 { background: var(--c-u7); color: #fff; }
.unit-header-cell.u8 { background: var(--c-u8); color: var(--c-text); }
.unit-header-cell.u9 { background: #9ca3af; color: #fff; }

/* Week rows */
.week-row { display: grid; grid-template-columns: 52px repeat(5,1fr); gap: 2px; margin-bottom: 2px; }
.week-label { display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 10px; color: var(--c-muted); font-weight: 500; line-height: 1.2; text-align: right; }
.col-headers { display: grid; grid-template-columns: 52px repeat(5,1fr); gap: 2px; margin-bottom: 4px; }
.col-header { text-align: center; font-size: 10px; font-weight: 600; color: var(--c-muted); text-transform: uppercase; padding: 2px; }

/* Day cells */
.day { min-height: 64px; border-radius: 4px; padding: 5px 6px; position: relative; border: 1.5px solid transparent; display: flex; flex-direction: column; gap: 2px; }
.day-date { font-size: 10px; color: var(--c-muted); font-weight: 500; }
.day-label { font-size: 11px; font-weight: 600; line-height: 1.3; }
.day-title { font-size: 10.5px; color: var(--c-muted); line-height: 1.3; }
.day-badge { font-size: 9px; padding: 1px 4px; border-radius: 10px; background: rgba(0,0,0,.07); color: var(--c-muted); margin-top: auto; align-self: flex-start; }

/* Cell types */
.day.oor { background: var(--c-oor); }
.day.break { background: var(--c-break); }
.day.break .day-label { color: var(--c-break-text); font-size: 10px; font-weight: 400; }
.day.half-day { background: var(--c-half-light); border-color: var(--c-half); }
.day.half-day .day-label { color: var(--c-half); }
.day.regents { background: var(--c-regents-light); border-color: var(--c-regents); }
.day.regents .day-label { color: var(--c-regents); font-size: 10px; }
.day.buffer { background: #f9fafb; border-color: #e5e7eb; border-style: dashed; }
.day.buffer .day-label { color: #d1d5db; font-size: 10px; }
.day.firstday, .day.lastday { border-color: #fbbf24 !important; }
.day.firstday .day-date::after { content: ' ★'; color: #f59e0b; }

/* Lessons */
.day.lesson { background: var(--c-surface); border-color: var(--c-border); }
.day.lesson.u1 { border-left: 3px solid var(--c-u1); }
.day.lesson.u2 { border-left: 3px solid var(--c-u2); }
.day.lesson.u3 { border-left: 3px solid var(--c-u3); }
.day.lesson.u4 { border-left: 3px solid var(--c-u4); }
.day.lesson.u5 { border-left: 3px solid var(--c-u5); }
.day.lesson.u6 { border-left: 3px solid var(--c-u6); }
.day.lesson.u7 { border-left: 3px solid var(--c-u7); }
.day.lesson.u8 { border-left: 3px solid var(--c-u8); }
.day.lesson.u9 { border-left: 3px solid #9ca3af; }

/* Optional lessons (original view) */
.day.optional { opacity: .6; }
.day.optional .day-label { text-decoration: line-through; text-decoration-color: rgba(0,0,0,.3); }
.opt-tag { font-size: 9px; background: #fef9c3; color: #854d0e; border-radius: 3px; padding: 1px 4px; margin-top: 1px; align-self: flex-start; }

/* Review days */
.day.review { background: var(--c-review-light); border-color: var(--c-review); }
.day.review .day-label { color: var(--c-review); font-size: 10.5px; }

/* Assessments */
.day.assess-mu { background: #ede9fe; border-color: var(--c-assess-mu); }
.day.assess-mu .day-label { color: var(--c-assess-mu); }
.day.assess-eou { background: #ddd6fe; border-color: var(--c-assess-eou); }
.day.assess-eou .day-label { color: var(--c-assess-eou); }

/* Violations */
.day.violation { background: var(--c-violation-light) !important; border-color: var(--c-violation) !important; border-width: 2px !important; }
.day.violation .day-label { color: var(--c-violation); }
.violation-tag { font-size: 9px; background: var(--c-violation); color: #fff; border-radius: 3px; padding: 1px 4px; align-self: flex-start; }

/* Combined lessons */
.day.combined { background: var(--c-combined-light); border-color: var(--c-combined); border-width: 2px; }
.day.combined .day-label { color: var(--c-combined); }
.combined-tag { font-size: 9px; background: var(--c-combined); color: #fff; border-radius: 3px; padding: 1px 4px; align-self: flex-start; }
.taxonomy-tag { font-size: 9px; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; border-radius: 3px; padding: 1px 4px; }
.load-tag { font-size: 9px; background: #fef9c3; color: #854d0e; border: 1px solid #fde047; border-radius: 3px; padding: 1px 4px; }

/* Why combined */
.why-btn { background:none; border:none; padding:0; cursor:pointer; font-size:9px; font-weight:600; color:var(--c-combined); display:inline-flex; align-items:center; gap:2px; margin-top:3px; line-height:1; }
.why-btn:hover { text-decoration:underline; }
.why-chev { display:inline-block; transition:transform 0.15s; }
.why-btn.open .why-chev { transform:rotate(180deg); }
.why-panel { display:none; border-top:2px solid var(--c-combined); background:var(--c-combined-light); padding:12px 16px; margin-bottom:2px; font-size:12px; line-height:1.6; }
.why-panel.open { display:block; }
.unit-header-cell.collapsible { cursor:pointer; user-select:none; }
.unit-header-cell.collapsible:hover { filter:brightness(0.92); }
.unit-chev { font-size:11px; opacity:0.75; display:inline-block; transition:transform 0.15s; }
.unit-header-cell.collapsed .unit-chev { transform:rotate(-90deg); }
.unit-weeks.collapsed { display:none; }

/* Resolved flag */
.day.resolved { outline: 2px solid var(--c-review); outline-offset: 1px; }
.resolved-tag { font-size: 9px; background: var(--c-review); color: #fff; border-radius: 3px; padding: 1px 4px; align-self: flex-start; }

/* Last day of school / overflow */
.lastday-tag { font-size: 9px; background: #dc2626; color: #fff; border-radius: 3px; padding: 1px 4px; align-self: flex-start; }
.day.lastday-boundary { border-bottom: 3px solid #dc2626 !important; }
.day.overflow-lesson { background: #fef2f2; border: 1px solid #fecaca; border-left: 3px solid #dc2626; }
.day.overflow-lesson .day-label { color: #991b1b; }

.stats-bar { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; display: flex; gap: 20px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; }
.stat-val { font-size: 18px; font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--c-muted); }
</style>
</head>

function buildSlots() {
  const slots = [];
  let d = new Date('2026-09-14T12:00:00Z');
  const end = new Date('2027-06-29T12:00:00Z');
  while (d < end) {
    const ds = d.toISOString().slice(0,10);
    const dow = d.getUTCDay();
    if (dow !== 0 && dow !== 6 && !NON_INSTR.has(ds) && !HALF_DAYS.has(ds) && !REGENTS.has(ds)) {
      slots.push(ds);
    }
    d.setUTCDate(d.getUTCDate() + 1);
  }
  return slots;
}

const SLOTS = buildSlots(); // 166 lesson-placement dates

  const [y,m,d] = ds.split('-');
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m]} ${+d}`;
}
function fmtShort(ds) {
  const [y,m,d] = ds.split('-');

// ─── Event builders ────────────────────────────────────────────────────────

function buildEvents(view) {
  const isOrig    = view === 'original';
  const isAdj     = view === 'adjustments';
  const isRound2  = view === 'round2';
  const isRound3  = view === 'round3';
  const isRound4  = view === 'round4';
  const events = [];

  for (const unit of UNITS) {
    if (!isOrig && unit.id === 9) continue;

    for (const sec of unit.sections) {
      const allL = sec.lessons;
      const viewL = isOrig ? allL : allL.filter(l => !l.opt);
      const totalInView = viewL.length;

      for (let vi = 0; vi < viewL.length; vi++) {
        const l = viewL[vi];

        // All adjustment rounds: combine U4 L8+L9 (fixes Dec 18 Fri → Dec 21 Mon violation)
        if ((isAdj || isRound2 || isRound3 || isRound4) && unit.id === 4 && l.n === 8) {
          const l9 = allL.find(x => x.n === 9);
          events.push({
            type:'combined', unit:4, unitTitle:unit.title, sec:sec.id,
            n:8, n2:9, t:l.t, t2:l9.t,
            badge:'Sec B · 4+5/5 ✓',
            taxonomy:'guided_practice + independent_practice',
            cogLoad:'medium',
            hasWhy: true,
          });
          continue;
        }
        if ((isAdj || isRound2 || isRound3 || isRound4) && unit.id === 4 && l.n === 9) continue;

        // Round2+: combine U4 L1+L2 (pre-MU pair; resolves EoU Jan 8→11 within 55-min limit; L14+L15 excluded at 75 min)
        if ((isRound2 || isRound3 || isRound4) && unit.id === 4 && l.n === 1) {
          const l2 = allL.find(x => x.n === 2);
          events.push({
            type:'combined', unit:4, unitTitle:unit.title, sec:sec.id,
            n:1, n2:2, t:l.t, t2:l2.t,
            badge:'Sec A · 1+2/2 ✓',
            taxonomy:'exploration + formal concepts',
            cogLoad:'low',
            hasWhy: true,
          });
          continue;
        }
        if ((isRound2 || isRound3 || isRound4) && unit.id === 4 && l.n === 2) continue;


        // Round3 + Round4: combine U7 L17+L18 (fixes U7 EoU Apr 9→12 violation)
        if ((isRound3 || isRound4) && unit.id === 7 && l.n === 17) {
          const l18 = allL.find(x => x.n === 18);
          events.push({
            type:'combined', unit:7, unitTitle:unit.title, sec:sec.id,
            n:17, n2:18, t:l.t, t2:l18.t,
            badge:'Sec D · 2+3/3 ✓',
            taxonomy:'sense_making + application',
            cogLoad:'medium',
            hasWhy: true,
          });
          continue;
        }
        if ((isRound3 || isRound4) && unit.id === 7 && l.n === 18) continue;

        // Round4 only: combine U8 L9+L10 (fixes U8 MU May 7→10 violation)
        if (isRound4 && unit.id === 8 && l.n === 9) {
          const l10 = allL.find(x => x.n === 10);
          events.push({
            type:'combined', unit:8, unitTitle:unit.title, sec:sec.id,
            n:9, n2:10, t:l.t, t2:l10.t,
            badge:'Sec C · 1+2/4 ✓',
            taxonomy:'sense_making + sense_making',
            cogLoad:'medium',
            hasWhy: true,
          });
          continue;
        }
        if (isRound4 && unit.id === 8 && l.n === 10) continue;

        const badge = `Sec ${sec.id} · ${vi+1}/${totalInView}${sec.ckpt ? ' ✓':''} `;
        events.push({
          type:'lesson', unit:unit.id, unitTitle:unit.title, sec:sec.id,
          n:l.n, t:l.t, opt:l.opt, badge,
        });
      }

      if (sec.muAfter && unit.hasMU) {
        if (!isOrig) events.push({type:'review', unit:unit.id, assessType:'mu', label:'Review — Mid-Unit Assessment'});
        events.push({type:'assessment', unit:unit.id, assessType:'mu', label:'Mid-Unit Assessment'});
      }
    }

    if (unit.hasEoU) {
      if (!isOrig) events.push({type:'review', unit:unit.id, assessType:'eou', label:'Review — End-of-Unit Assessment'});
      events.push({type:'assessment', unit:unit.id, assessType:'eou', label:'End-of-Unit Assessment'});
    }
  }

  return events;
}

// After building the event sequence, detect any review→assess pairs that are not
// consecutive calendar days and flag them as violations.
function detectViolations(events, view) {
  for (let i = 0; i < events.length - 1; i++) {
    if (events[i].type === 'review' && events[i+1].type === 'assessment') {
      const d1 = SLOTS[i], d2 = SLOTS[i+1];
      if (!d1 || !d2) continue;
      const diff = (new Date(d2+'T12:00:00Z') - new Date(d1+'T12:00:00Z')) / 86400000;
      if (diff !== 1) {
        events[i].violation = true;
        events[i+1].violation = true;
        // Any violation detected in adjustments/round2+ is new (prior ones were resolved)
        if (view === 'adjustments' || view === 'round2' || view === 'round3' || view === 'round4') {
          events[i].newViolation = true;
          events[i+1].newViolation = true;
        }
      }
    }
  }
}

// ─── Date mapping ──────────────────────────────────────────────────────────

function buildEventMap(events) {
  const map = {};
  for (let i = 0; i < events.length && i < SLOTS.length; i++) {
    map[SLOTS[i]] = events[i];
  }
  return map;
}

function getUnitBoundaries(eventMap) {
  // Returns {unitId: {start: date, end: date, count: n}}
  const bounds = {};
  const unitDates = {};
  for (const [date, ev] of Object.entries(eventMap)) {
    const u = ev.unit;
    if (!unitDates[u]) unitDates[u] = [];
    unitDates[u].push(date);
  }
  for (const [u, dates] of Object.entries(unitDates)) {
    dates.sort();
    const instr = dates.filter(d => {
      const ev = eventMap[d];
      return ev.type === 'lesson' || ev.type === 'combined';
    });
    bounds[u] = { start: dates[0], end: dates[dates.length-1], count: instr.length };
  }
  return bounds;
}

// Assign every school weekday to the unit whose last event preceded it
function buildDateToUnit(eventMap) {
  const map = {};
  for (const [d, ev] of Object.entries(eventMap)) map[d] = ev.unit;
  // Seed orientation days (before first lesson slot) into U1 so the opening week renders
  if (SLOTS[0] > '2026-09-10') {
    let pre = new Date('2026-09-10T12:00:00Z');
    const firstLesson = new Date(SLOTS[0] + 'T12:00:00Z');
    while (pre < firstLesson) {
      const ds = pre.toISOString().slice(0,10);
      const dow = pre.getUTCDay();
      if (dow >= 1 && dow <= 5) map[ds] = 1;
      pre.setUTCDate(pre.getUTCDate() + 1);
    }
  }
  let cur = new Date('2026-09-10T12:00:00Z');
  const stop = new Date('2027-06-29T12:00:00Z');
  let last = null;
  while (cur < stop) {
    const ds = cur.toISOString().slice(0,10);
    const dow = cur.getUTCDay();
    if (dow >= 1 && dow <= 5) {
      if (map[ds]) last = map[ds];
      else if (last !== null) map[ds] = last;
    }
    cur.setUTCDate(cur.getUTCDate() + 1);
  }
  return map;
}

const UNIT_COLORS = {1:'u1',2:'u2',3:'u3',4:'u4',5:'u5',6:'u6',7:'u7',8:'u8',9:'u9'};

function renderDayCell(date, eventMap, view) {
  const ev = eventMap[date];
  const dow = new Date(date + 'T12:00:00Z').getUTCDay(); // 1=Mon, 5=Fri
  const dateLabel = `<span class="day-date">${fmtShort(date)} ${DOW_NAMES[dow-1]}</span>`;

  // Overflow lesson (past school year) — must come before date-range guard
  if (ev && ev.overflow) {
    const optTag = ev.opt ? `<span class="opt-tag">optional</span>` : '';
    return `<div class="day overflow-lesson">${dateLabel}<span class="day-label">L${ev.n}. ${ev.t}</span>${optTag}<span class="lastday-tag">Past School Year</span><span class="day-badge">${ev.badge}</span></div>`;
  }

  // Special days
  if (date < SCHOOL_START || date > SCHOOL_END) {
    return `<div class="day oor">${dateLabel}</div>`;
  }
  if (NON_INSTR.has(date)) {
    return `<div class="day break">${dateLabel}<span class="day-label">${BREAK_LABELS[date]||'No School'}</span></div>`;
  }
  if (HALF_DAYS.has(date)) {
    return `<div class="day half-day">${dateLabel}<span class="day-label">Parent-Teacher Conf.</span><span class="day-title">Half Day — no instruction</span></div>`;
  }
  if (REGENTS.has(date)) {
    return `<div class="day regents">${dateLabel}<span class="day-label">Regents Administration</span></div>`;
  }
  if (date === SCHOOL_START) {
    if (!ev) return `<div class="day firstday lesson">${dateLabel}<span class="day-label">First Day of School</span></div>`;
  }

  if (!ev) {
    if (date === SCHOOL_END) {
      return `<div class="day break">${dateLabel}<span class="day-label">Last Day of School</span></div>`;
    }
    if (date < SLOTS[0]) {
      // Pre-instruction school day (orientation etc.) — no lesson placed
      return `<div class="day">${dateLabel}</div>`;
    }
    return `<div class="day buffer">${dateLabel}<span class="day-label">Flex / Buffer</span></div>`;
  }

  const uc = UNIT_COLORS[ev.unit] || '';

  if (ev.type === 'lesson') {
    const optCls = ev.opt ? ' optional' : '';
    const optTag = ev.opt ? `<span class="opt-tag">optional</span>` : '';
    const isLastDay = view === 'original' && date === SCHOOL_END;
    const lastDayTag = isLastDay ? `<span class="lastday-tag">Last Day of School</span>` : '';
    const lastDayCls = isLastDay ? ' lastday-boundary' : '';
    return `<div class="day lesson ${uc}${optCls}${lastDayCls}">${dateLabel}<span class="day-label">L${ev.n}. ${ev.t}</span>${optTag}${lastDayTag}<span class="day-badge">${ev.badge}</span></div>`;
  }

  if (ev.type === 'combined') {
    const panelId = `why-u${ev.unit}-l${ev.n}${ev.n2}`;
    if (ev.hasWhy) {
      const panelOpen = !((view === 'round2' && ev.n === 8) || (view === 'round3' && ev.unit === 4) || (view === 'round4' && ev.unit !== 8));
      return `<div class="day combined">${dateLabel}
        <span class="day-label">L${ev.n}+L${ev.n2} Combined</span>
        <span class="day-title">${ev.t} / ${ev.t2}</span>
        <button class="why-btn${panelOpen ? ' open' : ''}" onclick="toggleWhyPanel('${panelId}')" aria-expanded="${panelOpen}" aria-controls="${panelId}">Why combined? <span class="why-chev">▾</span></button>
        <span class="day-badge">${ev.badge}</span>
      </div>`;
    }
    return `<div class="day combined">${dateLabel}
      <span class="day-label">L${ev.n}+L${ev.n2} Combined</span>
      <span class="day-title">${ev.t} / ${ev.t2}</span>
      <div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:2px">
        <span class="combined-tag">combined — violation resolved</span>
        <span class="taxonomy-tag">${ev.taxonomy}</span>
        <span class="load-tag">load: ${ev.cogLoad}</span>
      </div>
      <span class="day-badge">${ev.badge}</span>
    </div>`;
  }

  if (ev.type === 'review') {
    const violCls = ev.violation ? ' violation' : '';
    const tag = ev.violation
      ? `<span class="violation-tag">${ev.newViolation ? 'NEW — Phase 3 re-runs' : 'TYPE A — weekend gap'}</span>`
      : '';
    return `<div class="day review${violCls}">${dateLabel}<span class="day-label">${ev.label}</span>${tag}</div>`;
  }

  if (ev.type === 'assessment') {
    const cls = ev.assessType === 'mu' ? 'assess-mu' : 'assess-eou';
    const violCls = ev.violation ? ' violation' : '';
    const tag = ev.violation
      ? `<span class="violation-tag">${ev.newViolation ? 'NEW — Phase 3 re-runs' : 'TYPE A — weekend gap'}</span>`
      : '';
    return `<div class="day ${cls}${violCls}">${dateLabel}<span class="day-label">${ev.label}</span><span class="day-title">U${ev.unit}</span>${tag}</div>`;
  }

  return `<div class="day">${dateLabel}</div>`;
}

function buildWeeks() {
  // Generate all weeks from Mon Sep 7, 2026 to end of Jun 2027
  const weeks = [];
  let mon = new Date('2026-09-08T12:00:00Z'); // Sep 8 is actually... wait
  // Sep 7, 2026: what day? Sep 10 = Thu, so Sep 7 = Mon ✓
  mon = new Date('2026-09-07T12:00:00Z');
  const stop = new Date('2027-07-05T12:00:00Z');

  while (mon < stop) {
    const days = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(mon); d.setUTCDate(d.getUTCDate() + i);
      days.push(d.toISOString().slice(0,10));
    }
    // Only include week if at least one day is on or after school start and on or before school end
    const anySchool = days.some(d => d >= SCHOOL_START && d <= SCHOOL_END);
    if (anySchool) {
      const mStr = mon.toISOString().slice(0,10);
      weeks.push({ monday: mStr, label: fmtDate(mStr), days });
    }
    mon.setUTCDate(mon.getUTCDate() + 7);
  }
  return weeks;
}

const ALL_WEEKS = buildWeeks();

function render(view) {
  const events = buildEvents(view);
  detectViolations(events, view);
  const eventMap = buildEventMap(events);

  // Seed overflow events (past school year) into eventMap so they render inline
  if (view === 'original') {
    const overflowEvs = events.slice(SLOTS.length);
    let nextDate = new Date(SCHOOL_END + 'T12:00:00Z');
    for (const ev of overflowEvs) {
      do {
        nextDate.setUTCDate(nextDate.getUTCDate() + 1);
      } while (nextDate.getUTCDay() === 0 || nextDate.getUTCDay() === 6);
      eventMap[nextDate.toISOString().slice(0,10)] = { ...ev, overflow: true };
    }
  }

  const bounds = getUnitBoundaries(eventMap);
  const dateToUnit = buildDateToUnit(eventMap);

  // Compute calendar spans per unit: min/max date assigned to each unit
  const calSpans = {};
  for (const [d, uid] of Object.entries(dateToUnit)) {
    if (!calSpans[uid]) calSpans[uid] = {start:d, end:d};
    if (d < calSpans[uid].start) calSpans[uid].start = d;
    if (d > calSpans[uid].end) calSpans[uid].end = d;
  }

  const activeUnits = UNITS
    .filter(u => view === 'original' || u.id !== 9)
    .filter(u => calSpans[u.id]);

  let html = `<div class="col-headers">
    <div class="col-header"></div>
    <div class="col-header">Mon</div>
    <div class="col-header">Tue</div>
    <div class="col-header">Wed</div>
    <div class="col-header">Thu</div>
    <div class="col-header">Fri</div>
  </div>`;

  const labeledWeeks = new Set();

  for (const unit of activeUnits) {
    const span = calSpans[unit.id];
    const b = bounds[unit.id];
    const allOpt = unit.sections.reduce((a,s)=>a+s.lessons.filter(l=>l.opt).length, 0);
    const allInstr = unit.sections.reduce((a,s)=>a+s.lessons.filter(l=>!l.opt).length, 0);
    const instrCount = b ? b.count : 0;
    const startDate = b ? fmtDate(b.start) : fmtDate(span.start);
    const endDate   = b ? fmtDate(b.end)   : fmtDate(span.end);
    const meta = view === 'original'
      ? `${allInstr} instructional + ${allOpt} optional`
      : `${instrCount} instructional lessons`;

    const isCollapsible = view === 'original' || view === 'round4' || view === 'pacing' || view === 'adjustments' || view === 'round2' || view === 'round3';
    const startCollapsed = (view === 'original' && unit.id !== 1)
      || (view === 'pacing' && unit.id !== 4 && unit.id !== 6)
      || (view === 'adjustments' && ![4,5,6,8].includes(unit.id))
      || (view === 'round2' && ![4,7].includes(unit.id))
      || (view === 'round3' && ![7,8].includes(unit.id))
      || (view === 'round4' && unit.id !== 8);
    html += `<div class="unit-header">
      <div id="unit-hdr-${unit.id}" class="unit-header-cell ${UNIT_COLORS[unit.id]}${isCollapsible ? ' collapsible' : ''}${startCollapsed ? ' collapsed' : ''}"${isCollapsible ? ` onclick="toggleUnit(${unit.id})"` : ''}>
        <span>Unit ${unit.id}: ${unit.title}</span>
        <span style="display:flex;align-items:center;gap:8px;"><span class="unit-meta">${startDate} – ${endDate} &nbsp;·&nbsp; ${meta}</span>${isCollapsible ? '<span class="unit-chev">▾</span>' : ''}</span>
      </div>
    </div>`;

    // Weeks that overlap this unit's calendar span
    const unitWeeks = ALL_WEEKS.filter(w =>
      w.days[4] >= span.start && w.days[0] <= span.end
    );

    if (isCollapsible) html += `<div class="${startCollapsed ? 'unit-weeks collapsed' : 'unit-weeks'}" id="unit-weeks-${unit.id}">`;

    for (const week of unitWeeks) {
      // Show week label only once (first unit to claim it)
      const lbl = labeledWeeks.has(week.monday) ? '' : week.label;
      labeledWeeks.add(week.monday);

      const cells = week.days.map(d => {
        const du = dateToUnit[d];
        // Day belongs to a different unit or is outside this unit's span → empty placeholder
        if (d < span.start || d > span.end || (du !== undefined && du !== unit.id)) {
          return `<div class="day oor"></div>`;
        }
        return renderDayCell(d, eventMap, view);
      }).join('');

      html += `<div class="week-row">
        <div class="week-label">${lbl}</div>
        ${cells}
      </div>`;

      const whyEvent = week.days
        .filter(d => d >= span.start && d <= span.end)
        .map(d => eventMap[d])
        .find(ev => ev && ev.hasWhy);
      if (whyEvent) {
        const panelId = `why-u${whyEvent.unit}-l${whyEvent.n}${whyEvent.n2}`;
        html += buildWhyPanel(panelId, whyEvent, view);
      }
    }

    if (isCollapsible) html += `</div>`;
  }

  return html;
}

function whyRow(kept, num, label, time, reason) {
  const dot = `<span style="width:6px;height:6px;border-radius:50%;background:${kept ? '#16a34a' : '#9ca3af'};flex-shrink:0;margin-top:4px;"></span>`;
  const txt = kept
    ? `<span style="font-size:11px;">${num} ${label}</span>`
    : `<div style="flex:1;min-width:0;"><span style="font-size:11px;color:#9ca3af;text-decoration:line-through;">${num} ${label}</span><span style="display:block;font-size:10px;color:#9ca3af;">${reason}</span></div>`;
  return `<div style="display:flex;align-items:flex-start;gap:6px;">${dot}${kept ? `<div style="flex:1;">` + txt + `</div>` : txt}<span style="font-size:10px;color:#9ca3af;white-space:nowrap;flex-shrink:0;">${time}</span></div>`;
}

  const rows1 = d.components1.map(c => whyRow(...c)).join('');

  </div>`;
}

function toggleUnit(unitId) {
  const weeks = document.getElementById(`unit-weeks-${unitId}`);
  const hdr = document.getElementById(`unit-hdr-${unitId}`);
  if (!weeks) return;
  const isOpen = !weeks.classList.contains('collapsed');
  weeks.classList.toggle('collapsed', isOpen);
  hdr.classList.toggle('collapsed', isOpen);
}

function toggleWhyPanel(id) {
  const panel = document.getElementById(id);
  const btn = document.querySelector(`[aria-controls="${id}"]`);
  if (!panel) return;
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  if (btn) {
    btn.classList.toggle('open', !isOpen);
    btn.setAttribute('aria-expanded', String(!isOpen));
  }
}

let currentView = 'original';

function setView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['original','pacing','adjustments','round2','round3','round4'][i] === view);
  });
  document.getElementById('view-desc').innerHTML = DESCS[view];

  const stats = STATS[view].map(s => `<div class="stat"><span class="stat-val">${s.v}</span><span class="stat-lbl">${s.l}</span></div>`).join('');
  document.getElementById('stats-bar').innerHTML = `<div class="stats-bar">${stats}</div>`;

  const leg = LEGENDS[view].map(l => {
    const border = l.border ? `border:1.5px solid ${l.border};` : '';
    return `<div class="legend-item"><div class="legend-swatch" style="background:${l.color};${border}"></div><span>${l.label}</span></div>`;
  }).join('');
  document.getElementById('legend').innerHTML = `<div class="legend">${leg}</div>`;

  const calEl = document.getElementById('calendar');
  calEl.innerHTML = '<div class="cal">' + render(view) + '</div>';
}
